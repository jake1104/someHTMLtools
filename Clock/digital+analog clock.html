<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hybrid Clock</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #222;
      color: #fff;
    }
    #digitalClock {
      font-size: 2rem;
      margin-bottom: 20px;
    }
    .clock {
      position: relative;
      width: 300px;
      height: 300px;
      border: 5px solid #fff;
      border-radius: 50%;
      background-color: #333;
    }
    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom;
      transform: translateX(-50%) rotate(0deg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      pointer-events: none;
    }
    .hand span {
      font-size: 1rem;
    }
    .hour {
      height: 100px;
      color: #f2f2f2; /* 더 밝은 회색 */
    }
    .minute {
      height: 150px;
      color: #bfbfbf; /* 밝은 회색 */
    }
    .second {
      height: 200px;
      color: #999999; /* 더 밝은 회색 */
    }
    .center {
      position: absolute;
      width: 10px;
      height: 10px;
      background-color: #fff;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>
  <div id="digitalClock">00:00:00</div>
  <div class="clock">
    <div class="hand hour" id="hourHand"></div>
    <div class="hand minute" id="minuteHand"></div>
    <div class="hand second" id="secondHand"></div>
    <div class="center"></div>
  </div>
  <script>
    function updateClock() {
      const now = new Date();
      const hours = now.getHours();
      const minutes = now.getMinutes();
      const seconds = now.getSeconds();

      // Update Digital Clock
      const digitalClock = document.getElementById("digitalClock");
      digitalClock.textContent = `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;

      // Prepare hands
      const hourHand = document.getElementById("hourHand");
      const minuteHand = document.getElementById("minuteHand");
      const secondHand = document.getElementById("secondHand");

      hourHand.innerHTML = '';
      minuteHand.innerHTML = '';
      secondHand.innerHTML = '';

      // Add numbers for hour, minute, second hands
      for (let i = 0; i < 3; i++) {
        const hourSpan = document.createElement('span');
        hourSpan.textContent = hours % 24;
        hourHand.appendChild(hourSpan);
      }

      for (let i = 0; i < 5; i++) {
        const minuteSpan = document.createElement('span');
        minuteSpan.textContent = String(minutes).padStart(2, '0');
        minuteHand.appendChild(minuteSpan);
      }

      for (let i = 0; i < 7; i++) {
        const secondSpan = document.createElement('span');
        secondSpan.textContent = String(seconds).padStart(2, '0');
        secondHand.appendChild(secondSpan);
      }

      // Update hand rotations
      const hourDeg = (hours % 12) * 30 + minutes * 0.5;
      const minuteDeg = minutes * 6;
      const secondDeg = seconds * 6;

      hourHand.style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
      minuteHand.style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
      secondHand.style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;
    }

    setInterval(updateClock, 1000);
    updateClock(); // Initial call
  </script>
</body>
</html>
