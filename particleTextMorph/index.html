<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedicated Particle Morphing with Controls</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000000; }
        #container { width: 100vw; height: 100vh; }
        #textInput {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px;
            font-size: 16px;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    <input type="text" id="textInput" placeholder="여기에 텍스트를 입력하세요 (Enter)">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer;
        let particles, particleCount = 30000; 
        let spherePositions;
        let currentTarget = 'sphere'; 
        const morphSpeed = 0.02; 
        const fluidFactor = 0.08; 
        let controls; // OrbitControls 변수 추가

        // 초기화
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 100;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('container').appendChild(renderer.domElement);

            // 🌟 OrbitControls 설정 🌟
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // 부드러운 회전 효과
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.minDistance = 20; // 최소 확대 거리
            controls.maxDistance = 150; // 최대 축소 거리

            createSpherePositions();
            createParticles();

            document.getElementById('textInput').addEventListener('keydown', function(event) {
                if (event.key === 'Enter') {
                    const newText = event.target.value;
                    if (newText) {
                        updateTextPositions(newText);
                        currentTarget = 'text'; 
                    } else {
                        currentTarget = 'sphere'; 
                    }
                }
            });

            window.addEventListener('resize', onWindowResize, false);
        }

        // 유기적인 구 형태 위치 계산 (노이즈 포함)
        function createSpherePositions() {
            spherePositions = new Float32Array(particleCount * 3);
            const radius = 30;
            const noise = 5; 

            for (let i = 0; i < particleCount; i++) {
                const phi = Math.acos((2 * i / particleCount) - 1);
                const theta = Math.sqrt(particleCount * Math.PI) * phi;

                let x = radius * Math.cos(theta) * Math.sin(phi);
                let y = radius * Math.sin(theta) * Math.sin(phi);
                let z = radius * Math.cos(phi);

                spherePositions[i * 3 + 0] = x + (Math.random() - 0.5) * noise;
                spherePositions[i * 3 + 1] = y + (Math.random() - 0.5) * noise;
                spherePositions[i * 3 + 2] = z + (Math.random() - 0.5) * noise;
            }
        }

        // 입자 생성
        function createParticles() {
            const initialPositions = spherePositions.slice(0); 

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.BufferAttribute(initialPositions, 3));
            geometry.setAttribute('targetPosition', new THREE.BufferAttribute(spherePositions, 3)); 

            const material = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 0.5,
                blending: THREE.AdditiveBlending,
                transparent: true
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        // 텍스트 형태 위치 계산 및 업데이트 (모든 입자를 텍스트 모양에 채워 넣기)
        function updateTextPositions(text) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const fontSize = 100;
            ctx.font = `bold ${fontSize}px Arial`;
            
            const textMetrics = ctx.measureText(text);
            canvas.width = textMetrics.width + 20; 
            canvas.height = fontSize * 1.5;
            
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.fillStyle = 'white';
            ctx.fillText(text, 10, fontSize * 1.1);

            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const newTextPositions = new Float32Array(particleCount * 3);
            
            const textWidth = canvas.width;
            const textHeight = canvas.height;
            const scale = 0.3;
            
            const activePixels = []; 
            for (let y = 0; y < textHeight; y++) {
                for (let x = 0; x < textWidth; x++) {
                    const index = (y * textWidth + x) * 4;
                    if (imageData.data[index + 3] > 128) {
                        activePixels.push({
                            x: (x - textWidth / 2) * scale,
                            y: (textHeight / 2 - y) * scale
                        });
                    }
                }
            }
            
            const totalActivePixels = activePixels.length;
            if (totalActivePixels === 0) {
                 currentTarget = 'sphere'; 
                 return;
            }

            // 모든 입자를 텍스트 픽셀 위치에 분산하여 배치
            for (let i = 0; i < particleCount; i++) {
                const pixelIndex = i % totalActivePixels; 
                const pixel = activePixels[pixelIndex];

                newTextPositions[i * 3 + 0] = pixel.x;
                newTextPositions[i * 3 + 1] = pixel.y;
                newTextPositions[i * 3 + 2] = (Math.random() - 0.5) * 5; 
            }

            particles.geometry.setAttribute('targetPosition', new THREE.BufferAttribute(newTextPositions, 3));
            particles.geometry.attributes.targetPosition.needsUpdate = true;
        }

        // 렌더링 루프
        function animate() {
            requestAnimationFrame(animate);
            
            // 🌟 controls.update() 호출 (회전/확대/축소 갱신) 🌟
            controls.update(); 

            updateParticles();

            // 텍스트 모핑 중이 아닐 때만 자동 회전 (OrbitControls와 충돌 방지)
            if (currentTarget === 'sphere' && !controls.active) {
                 particles.rotation.y += 0.002;
            } else {
                 particles.rotation.y = 0; 
            }
            
            renderer.render(scene, camera);
        }

        // 입자 위치 업데이트 (모핑 및 지속적인 유동성)
        function updateParticles() {
            const positions = particles.geometry.attributes.position.array;
            const targetPositions = particles.geometry.attributes.targetPosition.array;
            let target;

            if (currentTarget === 'sphere') {
                 target = spherePositions;
            } else {
                 target = targetPositions; 
            }

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;

                // 1. 타겟 위치로 모핑
                positions[i3 + 0] += (target[i3 + 0] - positions[i3 + 0]) * morphSpeed;
                positions[i3 + 1] += (target[i3 + 1] - positions[i3 + 1]) * morphSpeed;
                positions[i3 + 2] += (target[i3 + 2] - positions[i3 + 2]) * morphSpeed;

                // 2. 지속적인 유동성 추가
                positions[i3 + 0] += (Math.random() - 0.5) * fluidFactor;
                positions[i3 + 1] += (Math.random() - 0.5) * fluidFactor;
                positions[i3 + 2] += (Math.random() - 0.5) * fluidFactor;
            }

            particles.geometry.attributes.position.needsUpdate = true;
        }

        // 창 크기 조절
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
        animate();
    </script>
</body>
</html>
