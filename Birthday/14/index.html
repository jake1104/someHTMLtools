<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>생일 케이크</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="cake">
    <div class="plate"></div>
    <div class="layer layer-bottom"></div>
    <div class="layer layer-middle"></div>
    <div class="layer layer-top"></div>
    <div class="icing"></div>
    <div class="drip drip1"></div>
    <div class="drip drip2"></div>
    <div class="drip drip3"></div>
    <div class="candle-large">
        <div class="flame"></div>
    </div>
    <div class="candle-small">
        <div class="flame"></div>
    </div>
    <div class="candle-small">
        <div class="flame"></div>
    </div>
    <div class="candle-small">
        <div class="flame"></div>
    </div>
    <div class="candle-small">
        <div class="flame"></div>
    </div>
    <div class="popper-container left">
      <div class="popper-shell"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
    </div>
    <div class="popper-container right">
      <div class="popper-shell"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
      <div class="confetti"></div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
